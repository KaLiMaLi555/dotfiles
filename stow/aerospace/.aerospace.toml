# Graphics workspace g: every 3D / capture / NLE tool lands here
[[on-window-detected]]
if.app-id = 'org.blenderfoundation.blender'
run = 'move-node-to-workspace g'
[[on-window-detected]]
if.app-id = 'com.autodesk.Maya'
run = 'move-node-to-workspace g'
[[on-window-detected]]
if.app-id = 'com.maxon.zbrush'
run = 'move-node-to-workspace g'
[[on-window-detected]]
if.app-id = 'com.agisoft.metashape'
run = 'move-node-to-workspace g'
[[on-window-detected]]
if.app-id = 'com.RokokoElectronics.RokokoStudio'
run = 'move-node-to-workspace g'
[[on-window-detected]]
if.app-id = 'com.insta360.studio'
run = 'move-node-to-workspace g'
[[on-window-detected]]
if.app-id = 'com.gopro.GoPro'
run = 'move-node-to-workspace g'
[[on-window-detected]]
if.app-id = 'xyz.gyroflow'
run = 'move-node-to-workspace g'
[[on-window-detected]]
if.app-id = 'com.blackmagic-design.BlackmagicCam'
run = 'move-node-to-workspace g'
[[on-window-detected]]
if.app-id = 'com.epicgames.EpicGamesLauncher'
run = 'move-node-to-workspace g'

# --- FLOATING UTILITIES ---
[[on-window-detected]]
if.app-id = 'com.apple.systempreferences'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'org.p0deje.Maccy'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.dn.steady.paste'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.philandro.anydesk'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.microsoft.rdc.macos'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.ActivityMonitor'
run = 'layout floating'

# Cross-app modal dialogs float
[[on-window-detected]]
if.window-title-regex-substring = '(preferences|settings|get info|copy progress)'
check-further-callbacks = true
run = 'layout floating'

# Slack huddle/call windows float
[[on-window-detected]]
if.app-id = 'com.tinyspeck.slackmacgap'
if.window-title-regex-substring = '(huddle|call)'
run = 'layout floating'

# MongoDB Compass connection dialogs float
[[on-window-detected]]
if.app-id = 'com.mongodb.compass'
if.window-title-regex-substring = '(connect|new connection)'
run = 'layout floating'
