# ──────────────────────────────────────────────
# Keybindings
# ──────────────────────────────────────────────

# ── Prefix ────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── Pane splitting (intuitive keys) ──────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind _ split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ── Pane navigation (vim-style) ──────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R


# Last pane / window toggle
bind \; select-pane -l
bind Tab last-window

# ── Pane resizing ────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Window navigation ────────────────────────
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-n next-window
bind -n M-p previous-window
bind c new-window -c "#{pane_current_path}"

# ── Window swapping ──────────────────────────
bind -r < swap-window -t -1\; select-window -t -1
bind -r > swap-window -t +1\; select-window -t +1

# ── Session management ───────────────────────
bind S choose-session
bind N command-prompt -p "New session:" "new-session -s '%%'"

# ── Copy mode (vi) ──────────────────────────
bind v copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Escape send -X cancel

# Mouse selection — pane-bounded, stays selected until you copy or cancel
# Drag: select text, stays highlighted. y or Enter to copy, Escape to cancel
bind -T root MouseDrag1Pane if -F "#{mouse_any_flag}" { send -M } { copy-mode -M }
bind -T copy-mode-vi MouseDrag1Pane send -X begin-selection
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-no-clear "pbcopy"

# Double-click: select word, stays highlighted
bind -T root DoubleClick1Pane select-pane -t = \; copy-mode -H \; send -X select-word \; send -X copy-pipe-no-clear "pbcopy"
bind -T copy-mode-vi DoubleClick1Pane send -X select-word \; send -X copy-pipe-no-clear "pbcopy"

# Triple-click: select line (pane-bounded), stays highlighted
bind -T root TripleClick1Pane select-pane -t = \; copy-mode -H \; send -X select-line \; send -X copy-pipe-no-clear "pbcopy"
bind -T copy-mode-vi TripleClick1Pane send -X select-line \; send -X copy-pipe-no-clear "pbcopy"

# ── Quick actions ────────────────────────────
bind r run-shell "~/.config/tmux/gen-workspaces.sh" \; source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"
bind z resize-pane -Z
bind x kill-pane
bind X confirm-before -p "Kill window #W? (y/n)" kill-window
bind Q confirm-before -p "Kill session #S? (y/n)" kill-session
