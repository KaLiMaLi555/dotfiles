# ──────────────────────────────────────────────
# Theme — matches Ghostty default colorscheme
# ──────────────────────────────────────────────

set -g status-position top
set -g status-interval 5
set -g status-justify left

# Colors (Ghostty default: dark bg, light fg)
set -g status-style "bg=#1d1f21,fg=#c5c8c6"
set -g message-style "bg=#373b41,fg=#c5c8c6"
set -g message-command-style "bg=#373b41,fg=#c5c8c6"

# Copy mode selection
set -g mode-style "bg=#81a2be,fg=#1d1f21"

# Pane borders
set -g pane-border-style "fg=#373b41"
set -g pane-active-border-style "fg=#81a2be"

# Left status: session name
set -g status-left-length 30
set -g status-left "#[bg=#81a2be,fg=#1d1f21,bold]  #S #[bg=#1d1f21] "

# Window tabs
setw -g window-status-format "#[fg=#969896] #I:#W "
setw -g window-status-current-format "#[bg=#373b41,fg=#81a2be,bold] #I:#W "
setw -g window-status-separator ""

# Right status: time + date
set -g status-right-length 50
set -g status-right "#[fg=#969896]#(whoami) #[fg=#81a2be]│ #[fg=#c5c8c6]%H:%M #[fg=#969896]%b %d "
