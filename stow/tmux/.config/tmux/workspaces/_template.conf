# name: My Workspace
# keybind: F3
# enabled: false
#
# ── How to use ────────────────────────────────
# 1. Copy this file:  cp _template.conf myworkspace.conf
# 2. Edit the header:  name, keybind (F1-F12), enabled: true
# 3. Define windows and panes below
# 4. Reload tmux:  prefix + r
#
# ── Working directory ─────────────────────────
# Every new-window and split-window accepts -c "path"
# to set the starting directory for that pane.
#
#   new-window -n "api" -c "~/projects/api"
#   split-window -h -p 50 -c "~/projects/api/tests"
#
# ── Running commands ──────────────────────────
# Use send-keys to run commands when a pane opens.
# Stack multiple send-keys for multi-line startup:
#
#   new-window -n "server" -c "~/projects/api"
#   send-keys "source .venv/bin/activate" Enter
#   send-keys "export DEBUG=1" Enter
#   send-keys "uvicorn app:app --reload" Enter
#
# Each send-keys runs in the currently focused pane.
# After a split, send-keys targets the new pane.
# Use select-pane -t N to switch before sending.
#
# ── Available commands ────────────────────────
# rename-window "name"                        rename current window
# new-window -n "name" -c "path"              new window at path
# split-window -h -p 50 -c "path"             split right at path
# split-window -v -p 50 -c "path"             split below at path
# select-pane -t N                             focus pane N (1-indexed)
# send-keys "command" Enter                    run a command in the pane
# select-window -t N                           focus window N
# ──────────────────────────────────────────────

# Window 1
rename-window "main"
send-keys "cd ~/projects" Enter

# Window 2
# new-window -n "server" -c "~/projects/api"
# send-keys "source .venv/bin/activate" Enter
# send-keys "export DEBUG=1" Enter
# send-keys "python manage.py runserver" Enter
# split-window -h -p 50 -c "~/projects/api"
# send-keys "source .venv/bin/activate" Enter
# send-keys "celery -A app worker --loglevel=info" Enter

# Go back to first window
select-window -t 1
