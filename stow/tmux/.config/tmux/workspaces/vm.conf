# name: VM Dev
# keybind: D
# enabled: true

# Simple workspace for remote VM use — no project-specific commands

# Window 1: Editor
rename-window "editor"

# Window 2: Shell — two panes
new-window -n "shell"
split-window -h -p 50

# Window 3: Git
new-window -n "git"
send-keys "git status" Enter

# Back to editor
select-window -t 1
